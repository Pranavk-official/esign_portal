# Nginx reverse proxy config for ASP eSign Gateway Frontend
# ──────────────────────────────────────────────────────────────────────────────
# Place this at: ./nginx/conf.d/esign.conf
#
# TLS certificates must be at:
#   ./nginx/certs/esign.crt   — full chain PEM
#   ./nginx/certs/esign.key   — private key PEM
#
# For KSDC internal CA: obtain cert from the KSDC/KSITM PKI team and convert
# to PEM format if needed:
#   openssl pkcs12 -in cert.pfx -out esign.crt -nokeys
#   openssl pkcs12 -in cert.pfx -out esign.key -nocerts -nodes
# ──────────────────────────────────────────────────────────────────────────────

# Rate limiting zone — protect against brute-force on /login
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name _;

    # ACME challenge passthrough (only needed for Let's Encrypt on internet-facing VMs)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + upstream proxy
server {
    listen 443 ssl;
    http2 on;
    server_name _;   # Replace with your FQDN, e.g. esign.kerala.gov.in

    # ── TLS Configuration ────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/esign.crt;
    ssl_certificate_key /etc/nginx/certs/esign.key;

    # Modern TLS only — KSDC/NIC security baseline
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Proxy to Next.js container ───────────────────────────────────────────
    location / {
        proxy_pass         http://esign-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — increase for large document uploads
        proxy_connect_timeout  60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # ── Rate-limit the login endpoint ────────────────────────────────────────
    location /login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://esign-portal:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js static assets — aggressive caching ───────────────────────────
    location /_next/static/ {
        proxy_pass http://esign-portal:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check endpoint — no logging ───────────────────────────────────
    location /api/health {
        proxy_pass http://esign-portal:3000;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── File upload size limit (adjust for eSign document sizes) ─────────────
    client_max_body_size 20M;
}
